name: Daily Thought Update (backup)

on:
  schedule:
    # Backup trigger at 03:30 UTC — offset from the primary workflow (every 6 h
    # starting at midnight) so this run fills in if midnight UTC is delayed.
    # Same idempotency guarantee applies: no commit is made if the thought was
    # already updated today by the primary workflow.
    - cron: '30 3 * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  update-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    # Prevent parallel runs from racing on the same commit
    concurrency:
      group: daily-thought
      cancel-in-progress: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # Explicitly disable submodule handling to avoid spurious warnings
        # from the 'dashboard' directory which is not a registered submodule.
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run update script
      run: |
        python update_readme.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md
        if git diff --staged --quiet; then
          echo "No changes to commit — thought already up to date for today."
        else
          git commit -m "🧠 Update daily thought [automated]"
          git pull --rebase
          git push
        fi
